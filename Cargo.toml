[package]
name = "arc_core"
version = "0.1.0"
edition = "2024"

[dependencies]
async-trait = "0.1"
chacha20poly1305 = "0.10"
ed25519-dalek = "2.1"
hkdf = "0.12"
ml-kem = { version = "0.3.2", features = ["getrandom"] }
rand = "0.8"
rand_core = "0.10"
sha2 = "0.10"
thiserror = "1.0"
x25519-dalek = { version = "2", features = ["static_secrets"] }

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt"] }
